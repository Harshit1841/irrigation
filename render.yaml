services:
  - type: web
    name: ai-irrigation-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    pythonVersion: 3.11.0
    autoDeploy: true
    envVars:
      - key: API_KEY
        value: gorakhpur123456789
      - key: DEBUG
        value: "false"
